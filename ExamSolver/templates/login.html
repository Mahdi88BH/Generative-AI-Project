<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            --primary: #10a37f;
            --primary-hover: #1a7f64;
            --bg-dark: #202123;
            --card-bg: rgba(52, 53, 65, 0.95);
            --input-bg: #3e3f4b;
            --text-light: #ececf1;
            --text-dim: #8e8ea0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #343541 0%, #202123 100%);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Lueur animée en arrière-plan */
        .bg-glow {
            position: absolute;
            width: 450px; height: 450px;
            background: var(--primary);
            filter: blur(160px);
            opacity: 0.08;
            z-index: 0;
            animation: move 25s infinite alternate;
        }

        .auth-card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            animation: fadeIn 0.6s ease-out;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-area i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .auth-card h2 {
            text-align: center;
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--text-dim);
            letter-spacing: 0.8px;
        }

        /* Styling des inputs injectés par {{ form.as_p }} ou manuellement */
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--input-bg);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #4a4b59;
            box-shadow: 0 0 0 4px rgba(16, 163, 127, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.05rem;
            margin-top: 1rem;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 163, 127, 0.3);
        }

        .errorlist {
            color: #ff6b6b;
            font-size: 0.85rem;
            list-style: none;
            padding: 0;
            margin-bottom: 1rem;
            text-align: center;
        }

        .footer-link {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.95rem;
            color: var(--text-dim);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer-link a:hover { color: var(--primary-hover); }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes move {
            from { transform: translate(-30%, -30%); }
            to { transform: translate(30%, 30%); }
        }
    </style>
</head>
<body>
    <body>
    <div class="bg-glow"></div>

    <div class="auth-card">
        <div class="logo-area">
            <i class="fa-solid fa-brain"></i>
            <h2>Bon retour</h2>
            <p class="subtitle">Connectez-vous pour continuer l'analyse.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="errorlist">
                    <i class="fa-solid fa-circle-exclamation"></i> Identifiants incorrects.
                </div>
            {% endif %}

            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}

            <button type="submit" class="btn-submit">
                Continuer <i class="fa-solid fa-bolt"></i>
            </button>
        </form>
        
        <div class="footer-link">
            Pas encore de compte ? <a href="{% url 'register' %}">S'inscrire gratuitement</a>
        </div>
    </div>
</body>
</body>
</html>
